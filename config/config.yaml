# Screening thresholds and paper-LBO assumptions.
# All thresholds are deliberately configurable — tighten or loosen and re-run.

screening:
  # Leverage: low current leverage = unused debt capacity (the core of the thesis)
  max_net_debt_to_ebitda: 2.0        # Net debt / LTM EBITDA must be below this
  min_interest_coverage: 3.0         # EBITDA / interest expense must exceed this

  # Free cash flow
  min_consecutive_fcf_years: 3       # FCF must be positive in each of the last N years

  # Profitability
  min_ebitda_margin: 0.15            # latest-year EBITDA margin floor
  margin_trend_years: 5              # window used to judge margin stability
  margin_tolerance_pp: 1.5           # recent avg margin may be at most this many
                                     # percentage points below the earlier avg
                                     # and still count as "stable"

  # Ownership (take-private feasibility)
  min_promoter_holding_pct: 50.0     # promoter needs control to take it private
  max_promoter_holding_pct: 75.0     # SEBI ceiling on non-public shareholding
  max_promoter_pledge_pct: 5.0       # high pledge = distressed promoter, excluded

  # Size band: roughly $200M - $2B at ~85 INR/USD
  min_market_cap_cr: 1700
  max_market_cap_cr: 17000

lbo:
  entry_multiple: 8.0                # EV / LTM EBITDA at entry
  tranches:                          # ordered: index 0 = most senior (swept first)
    - {name: senior,    turns: 2.0, rate: 0.090, mandatory_amort_pct: 0.10}
    - {name: mezzanine, turns: 1.0, rate: 0.130, mandatory_amort_pct: 0.0}
  revolver_rate: 0.085               # interest on drawn revolver balance
  hold_years: 5
  tax_rate: 0.25                     # ~Indian corporate rate incl. surcharge
  revenue_growth: 0.08               # annual revenue growth (margin held flat)
  ppe_pct_of_revenue: 0.40           # opening PP&E as a share of entry revenue
  da_pct_of_ppe: 0.10                # D&A as a share of opening PP&E each year
  capex_pct_of_revenue: 0.05         # capex as a share of revenue (~= D&A so PP&E stays ~flat)
  txn_fee_pct_of_ev: 0.020           # M&A/legal/diligence fees, % of EV (equity-funded, into goodwill)
  financing_fee_pct_of_debt: 0.025   # arrangement/OID fees, % of debt (capitalized, amortized over hold)
  cogs_pct_of_revenue: 0.65          # COGS base for inventory & payables days
  working_capital:
    dso_days: 45                     # receivables days, against revenue
    dio_days: 60                     # inventory days, against COGS
    dpo_days: 40                     # payables days, against COGS

sensitivity:
  entry_multiples: [6.0, 7.0, 8.0, 9.0, 10.0]
  leverage_multiples: [2.0, 2.5, 3.0, 3.5, 4.0]
